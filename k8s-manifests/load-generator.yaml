apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: default
  labels:
    app: load-generator
spec:
  replicas: 2  # 5 parallel load generators
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
      - name: busybox
        image: busybox
        command:
        - /bin/sh
        - -c
        - |
          # load generation
          echo "Starting load generator..."
          # Run 10 parallel wget processes
          for i in $(seq 1 4); do
            while true; do
              wget -q -O- http://php-apache 2>/dev/null > /dev/null
              # No delay - maximum CPU load
            done &
          done
          wait
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi